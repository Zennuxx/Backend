<!DOCTYPE html>
<html>
<head>
  <title>Stranger Chat</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; margin: 0; padding: 1rem; height: 100vh; display: flex; flex-direction: column; }
    .info { background: #1e293b; color: #94a3b8; padding: 8px 16px; border-radius: 2rem; text-align: center; font-size: 0.85rem; margin-bottom: 1rem; }
    .messages { flex: 1; background: #1e293b; border-radius: 1.5rem; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .you, .stranger { max-width: 80%; padding: 10px 14px; border-radius: 1.2rem; word-wrap: break-word; }
    .you { background: #3b82f6; align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
    .stranger { background: #334155; align-self: flex-start; color: #f1f5f9; border-bottom-left-radius: 4px; }
    .input-area { display: flex; gap: 10px; margin-top: 1rem; }
    input { flex: 1; padding: 12px; border: none; border-radius: 40px; background: #1e293b; color: white; font-size: 1rem; }
    button { background: #3b82f6; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; }
    .skip { background: #ef4444; margin-left: 10px; }
    .skip:hover { background: #dc2626; }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="info">
  🔒 You're chatting with a <strong>random stranger</strong> — stay respectful.
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
  <button id="sendBtn">Send</button>
  <button id="skipBtn" class="skip">Skip → New stranger</button>
</div>

<script>
  const socket = io();
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const skipBtn = document.getElementById('skipBtn');

  function addMessage(sender, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = sender === 'you' ? 'you' : 'stranger';
    msgDiv.innerText = `${sender === 'you' ? 'You' : 'Stranger'}: ${text}`;
    messagesDiv.appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: 'smooth' });
  }

  socket.on('message', (msg) => {
    addMessage('stranger', msg);
  });

  socket.on('paired', () => {
    addMessage('stranger', '✨ You are now connected to a stranger. Say hi!');
  });

  socket.on('stranger_left', () => {
    addMessage('stranger', '🚪 Stranger disconnected. Press Skip to find someone new.');
  });

  sendBtn.onclick = () => {
    const msg = input.value.trim();
    if (msg) {
      socket.emit('message', msg);
      addMessage('you', msg);
      input.value = '';
    }
  };

  skipBtn.onclick = () => {
    socket.emit('skip');
    messagesDiv.innerHTML = '';
    addMessage('stranger', '🔄 Looking for a new stranger...');
  };

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
</script>
</body>
</html>
